<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viewer Signaling Peer</title>
  <style>
    body { max-width: 900px; margin: 32px auto; padding: 0 16px; font: 15px/1.6 ui-monospace, monospace; background: #111; color: #ddd; }
    h1 { font-size: 20px; }
    #status { color: #8fd; }
    #log { margin-top: 20px; padding: 16px; min-height: 360px; white-space: pre-wrap; overflow-wrap: anywhere; border: 1px solid #555; background: #080808; }
    .render { color: #8cf; }
    .viewer { color: #fc8; }
    .system { color: #aaa; }
  </style>
</head>
<body>
  <h1>Viewer Signaling Peer (no WebRTC, no WebSocket)</h1>
  <div id="status">Connecting to SSE...</div>
  <div id="log" aria-live="polite"></div>

  <script>
    const logBox = document.querySelector('#log');
    const statusBox = document.querySelector('#status');

    function log(sender, message) {
      const line = document.createElement('div');
      line.className = sender;
      line.textContent = `[${new Date().toLocaleTimeString()}] [${sender}] ${message}`;
      logBox.append(line);
      console.log(`[${sender}] ${message}`);
    }

    async function post(url, body) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
    }

    const eventSource = new EventSource('/api/signaling/viewer/events');

    eventSource.onopen = () => {
      statusBox.textContent = 'SSE connected. Waiting for Render offer/ICE.';
      log('system', 'Connected to viewer SSE: GET /api/signaling/viewer/events');
    };

    eventSource.addEventListener('signal', async message => {
      try {
        const event = JSON.parse(message.data);
        log(event.sender, `${event.type.toUpperCase()} → ${event.payload}`);

        if (event.type === 'offer' && event.sender === 'render') {
          statusBox.textContent = 'Offer received. Sending answer/ICE.';

          const sdp = 'v=0\r\no=viewer 1 1 IN IP4 127.0.0.1\r\ns=mock-answer\r\nt=0 0';
          await post('/api/signaling/viewer/answer', { sdp });
          log('viewer', `ANSWER → ${sdp}`);

          for (const candidate of [
            'candidate:viewer-1 1 udp 2122260223 192.0.2.2 50001 typ host',
            'candidate:viewer-2 1 udp 1686052607 198.51.100.2 3479 typ srflx'
          ]) {
            await post('/api/signaling/viewer/ice', { candidate });
            log('viewer', `ICE → ${candidate}`);
          }

          statusBox.textContent = 'Answer/ICE sent. Waiting for more Render ICE.';
        }
      } catch (error) {
        log('system', `Failed to process signaling event: ${error.message}`);
        statusBox.textContent = 'Signaling failed.';
      }
    });

    eventSource.onerror = () => {
      statusBox.textContent = 'SSE disconnected. The browser is reconnecting...';
      log('system', 'Viewer SSE disconnected');
    };
  </script>
</body>
</html>
