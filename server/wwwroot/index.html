<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTTP Signaling Demo</title>
  <style>
    body { max-width: 900px; margin: 32px auto; padding: 0 16px; font: 15px/1.6 ui-monospace, monospace; background: #111; color: #ddd; }
    h1 { font-size: 20px; }
    button { padding: 8px 12px; font: inherit; cursor: pointer; }
    #status { margin-left: 12px; color: #8fd; }
    #log { margin-top: 20px; padding: 16px; min-height: 360px; white-space: pre-wrap; overflow-wrap: anywhere; border: 1px solid #555; background: #080808; }
    .server { color: #8cf; }
    .client { color: #fc8; }
    .system { color: #aaa; }
  </style>
</head>
<body>
  <h1>最小 HTTP Signaling（无 WebRTC、无 WebSocket）</h1>
  <button id="start">开始新的信令会话</button><span id="status">尚未开始</span>
  <div id="log" aria-live="polite"></div>

  <script>
    const logBox = document.querySelector('#log');
    const statusBox = document.querySelector('#status');
    const startButton = document.querySelector('#start');
    let generation = 0;

    function log(sender, message) {
      const line = document.createElement('div');
      line.className = sender;
      line.textContent = `[${new Date().toLocaleTimeString()}] [${sender}] ${message}`;
      logBox.append(line);
      console.log(`[${sender}] ${message}`);
    }

    async function request(url, options) {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      return response.status === 204 ? null : response.json();
    }

    async function startSession() {
      const currentGeneration = ++generation;
      startButton.disabled = true;
      logBox.replaceChildren();
      statusBox.textContent = '创建会话中…';

      try {
        const { sessionId } = await request('/api/signaling/sessions', { method: 'POST' });
        log('system', `会话 ${sessionId} 已创建；通过 SSE 接收服务端信令`);
        statusBox.textContent = `会话：${sessionId}`;

        let answered = false;
        let clientIceSent = false;
        let confirmedClientIce = 0;
        const eventSource = new EventSource(`/api/signaling/sessions/${sessionId}/events`);

        await new Promise((resolve, reject) => {
          eventSource.addEventListener('signal', async message => {
            try {
              if (generation !== currentGeneration) {
                eventSource.close();
                resolve();
                return;
              }

              const event = JSON.parse(message.data);
              log(event.sender, `${event.type.toUpperCase()} → ${event.payload}`);

              if (event.type === 'offer' && event.sender === 'server' && !answered) {
                answered = true;
                const sdp = 'v=0\r\no=client 1 1 IN IP4 127.0.0.1\r\ns=mock-answer\r\nt=0 0';
                log('client', '收到 SSE offer，正在用 HTTP POST 返回模拟 answer');
                await request(`/api/signaling/sessions/${sessionId}/answer`, {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({ sdp })
                });
              }

              if (answered && !clientIceSent) {
                clientIceSent = true;
                for (const candidate of [
                  'candidate:client-1 1 udp 2122260223 192.0.2.2 50001 typ host',
                  'candidate:client-2 1 udp 1686052607 198.51.100.2 3479 typ srflx'
                ]) {
                  log('client', `通过 HTTP POST 发送 ICE → ${candidate}`);
                  await request(`/api/signaling/sessions/${sessionId}/ice`, {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ candidate })
                  });
                }
              }

              if (event.type === 'ice' && event.sender === 'client') {
                confirmedClientIce++;
              }

              if (confirmedClientIce === 2) {
                log('system', 'SSE 信令交换完成（仅交换文本，未创建 RTCPeerConnection）');
                statusBox.textContent = `会话：${sessionId}（完成）`;
                eventSource.close();
                resolve();
              }
            } catch (error) {
              eventSource.close();
              reject(error);
            }
          });

          eventSource.onerror = () => {
            log('system', 'SSE 暂时断开，浏览器将自动重连');
          };
        });
      } catch (error) {
        log('system', `错误：${error.message}`);
        statusBox.textContent = '失败';
      } finally {
        if (generation === currentGeneration) startButton.disabled = false;
      }
    }

    startButton.addEventListener('click', startSession);
    startSession();
  </script>
</body>
</html>
